{% extends "base.html" %}
{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <i class="fa-solid fa-building-columns logo-icon"></i>
            <h2>Portal Login</h2>
            <p>Enter your credentials to access your academic dashboard</p>
        </div>
        <form action="{{ url_for('login') }}" method="POST">
            <div class="input-group">
                <label>Username</label>
                <div class="input-field">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="username" placeholder="e.g. paras or admin" required>
                </div>
            </div>
            <div class="input-group">
                <label>Password</label>
                <div class="input-field">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn-primary btn-full">Sign In <i class="fa-solid fa-arrow-right"></i></button>
        </form>
    </div>
</div>
{% endblock %}
